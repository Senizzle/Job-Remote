name: Daily Remote Analyst Job Search

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      force_email:
        description: 'Send email even if no new jobs found (useful for testing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  search-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r Scripts/requirements.txt

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            seen-jobs-${{ runner.os }}-

      - name: Search for new jobs
        id: search
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
        run: |
          mkdir -p data
          python Scripts/search.py
          COUNT
