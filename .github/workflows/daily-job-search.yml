name: Daily Remote Analyst Job Search

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 8:00am ET (UTC-5), Monday–Friday
  workflow_dispatch:
    inputs:
      force_email:
        description: 'Send email even if no new jobs found (useful for testing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  search-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r Scripts/requirements.txt

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            seen-jobs-${{ runner.os }}-

      - name: Search for new jobs
        id: search
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
        run: |
          mkdir -p data
          python Scripts/search.py
          COUNT=$(python -c "import json; print(json.load(open('data/new_jobs.json'))['new_count'])")
          echo "new_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT new job(s)"

      - name: Write job summary
        if: always()
        run: |
          python Scripts/summarize.py >> $GITHUB_STEP_SUMMARY

      - name: Send email digest
        if: ${{ steps.search.outputs.new_count > 0 || inputs.force_email == true }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FORCE_EMAIL: ${{ inputs.force_email }}
        run: python Scripts/send_email.py

      - name: Upload job results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-results-${{ github.run_id }}
          path: data/new_jobs.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Log outcome
        if: always()
        run: |
          COUNT="${{ steps.search.outputs.new_count }}"
          if [ -z "$COUNT" ]; then
            echo "⚠ Search step did not complete."
          elif [ "$COUNT" -gt "0" ]; then
            echo "✅ Found $COUNT new job(s) — email sent."
          else
            echo "💤 No new jobs found — skipping email."
          fi
